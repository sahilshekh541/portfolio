<div class="projects-container min-h-screen pt-32 pb-20 px-6 sm:px-12 lg:px-24 bg-surface">
  <div class="max-w-7xl mx-auto">
    <div class="header-section mb-16 text-center lg:text-left">
      <h1
        class="text-5xl md:text-8xl font-extrabold text-[#fcdccb] mb-6 uppercase tracking-tighter font-headline leading-none">
        Selected <br>
        <span class="text-primary italic">Works</span>
      </h1>
      <p class="text-[#d4c4b4] text-lg md:text-xl max-w-2xl leading-relaxed font-body mx-auto lg:mx-0">
        A collection of digital experiences crafted with precision, performance, and purpose.
      </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-10 lg:gap-16">
      <article *ngFor="let project of projects"
        class="project-card group cursor-pointer bg-surface-container rounded-3xl overflow-hidden border border-outline-variant/10 hover:border-primary/30 transition-all duration-500 hover:shadow-2xl hover:shadow-primary/5"
        [routerLink]="['/projects', project.id]">
        <div class="relative overflow-hidden aspect-[16/10]">
          <img [src]="project.image" [alt]="project.title"
            class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105">
          <div
            class="absolute inset-0 bg-surface/60 opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex items-center justify-center">
            <span
              class="px-8 py-4 brushed-gold text-on-primary font-bold rounded-xl transform translate-y-6 group-hover:translate-y-0 transition-transform duration-500 uppercase tracking-tight font-headline">
              View Case Study
            </span>
          </div>
        </div>

        <div class="project-info p-8 md:p-10 bg-surface-container-high/40">
          <span class="text-xs font-bold uppercase tracking-[0.3em] text-primary mb-4 block font-label">
            {{ project.category }}
          </span>
          <h2
            class="text-3xl md:text-4xl font-extrabold text-white mb-4 group-hover:text-primary transition-colors font-headline tracking-tight leading-tight">
            {{ project.title }}
          </h2>
          <p class="text-[#d4c4b4] text-base md:text-lg leading-relaxed font-body line-clamp-3">
            {{ project.details }}
          </p>
        </div>
      </article>
    </div>
  </div>
</div>
