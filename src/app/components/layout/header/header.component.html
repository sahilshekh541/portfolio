<header>
    <!-- Top Navigation Bar -->
    <nav
        class="fixed top-0 w-full z-50 bg-[#1f1007]/60 backdrop-blur-xl flex flex-col justify-center px-6 lg:px-12 py-4 lg:py-6">
        <div class="flex justify-between items-center w-full">
            <div class="text-xl lg:text-2xl font-black text-[#fcdccb] tracking-tight font-headline">Sahil Shekh</div>

            <div class="hidden lg:flex items-center gap-8 font-headline uppercase tracking-tighter text-sm">
                <a class="nav-link text-[#d4c4b4] hover:text-[#fcdccb] transition-transform duration-200 hover:scale-[1.02]"
                    routerLink="/" routerLinkActive="active font-bold text-[#fec782]"
                    [routerLinkActiveOptions]="{ exact: true }">Home</a>
                <a class="nav-link text-[#d4c4b4] hover:text-[#fcdccb] transition-transform duration-200 hover:scale-[1.02]"
                    routerLink="/projects" routerLinkActive="active font-bold text-[#fec782]">Projects</a>
                <a class="nav-link text-[#d4c4b4] hover:text-[#fcdccb] transition-transform duration-200 hover:scale-[1.02]"
                    href="#">Services</a>
                <a class="nav-link text-[#d4c4b4] hover:text-[#fcdccb] transition-transform duration-200 hover:scale-[1.02]"
                    href="#">Blogs</a>
            </div>

            <button
                class="hidden lg:block brushed-gold text-on-primary font-bold py-3 px-8 rounded-lg hover:scale-[1.02] active:scale-95 transition-all duration-200 font-headline uppercase tracking-tighter">
                Get in Touch
            </button>

            <!-- Hamburger Button -->
            <button class="lg:hidden text-[#fcdccb] focus:outline-none p-2" (click)="toggleMenu()">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path *ngIf="!isMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 6h16M4 12h16m-7 6h7"></path>
                    <path *ngIf="isMenuOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>

        <div class="lg:hidden w-full overflow-hidden transition-all duration-300 ease-in-out"
            [style.maxHeight]="isMenuOpen ? '400px' : '0px'" [style.opacity]="isMenuOpen ? '1' : '0'"
            [style.marginTop]="isMenuOpen ? '1rem' : '0'">
            <div class="flex flex-col items-center gap-6 font-headline uppercase tracking-tighter text-sm pb-4 pt-2">
                <a class="nav-link text-[#d4c4b4] hover:text-[#fcdccb]" routerLink="/"
                    routerLinkActive="active font-bold text-[#fec782]"
                    [routerLinkActiveOptions]="{ exact: true }">Home</a>
                <a class="nav-link text-[#d4c4b4] hover:text-[#fcdccb]" routerLink="/projects"
                    routerLinkActive="active font-bold text-[#fec782]">Case Studies</a>
                <a class="nav-link text-[#d4c4b4] hover:text-[#fcdccb]" href="#">Services</a>
                <a class="nav-link text-[#d4c4b4] hover:text-[#fcdccb]" href="#">Blogs</a>
                <button
                    class="w-full brushed-gold text-on-primary font-bold py-3 px-8 rounded-lg active:scale-95 transition-all duration-200 font-headline uppercase tracking-tighter">
                    Get in Touch
                </button>
            </div>
        </div>
    </nav>
</header>
