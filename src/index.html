    href="https://fonts.googleapis.com/css2?family=Istok+Web:ital,wght@0,400;0,700;1,400;1,700&family=Sora:wght@100..800&display=swap"
    rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
    }

    .loader-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #3e2b20;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      flex-direction: column;
      overflow: hidden;
      font-family: 'Sora', sans-serif;
    }

    .loader-frame {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      bottom: 20px;
      pointer-events: none;
      z-index: 10;
    }

    .loader-wrapper::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)"/%3E%3C/svg%3E');
      opacity: 0.05;
      pointer-events: none;
      mix-blend-mode: multiply;
    }

    .loader-content {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .logo-container {
      display: flex;
      gap: 15px;
      z-index: 2;
    }

    .logo-fragment {
      font-size: 8vw;
      font-weight: 800;
      color: #fff;
      text-transform: uppercase;
      opacity: 0;
      visibility: hidden;
      transform: translateY(50px) rotateY(90deg) scale(0.5);
      text-shadow: 4px 4px 0 #e0ac69;
    }

    .reveal-text-container {
      position: absolute;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 10vw;
      box-sizing: border-box;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0;
      pointer-events: none;
      z-index: 1;
    }

    .reveal-text-left {
      font-size: 2.5vw;
      font-weight: 800;
      color: #3e2b20;
      background: #f5e6d3;
      padding: 10px 20px;
      letter-spacing: 2px;
    }

    .reveal-text-right {
      font-size: 2.5vw;
      font-weight: 800;
      color: #f5e6d3;
      background: #e0ac69;
      padding: 10px 20px;
      letter-spacing: 2px;
    }

    .progress-container {
      position: absolute;
      bottom: 80px;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 2;
    }

    .percentage {
      color: #f5e6d3;
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .progress-bar-container {
      width: 250px;
      height: 2px;
      background: rgba(245, 230, 211, 0.2);
      overflow: hidden;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: #e0ac69;
    }

    @media (max-width: 991.98px) {
      .reveal-text-container {
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22vw;
      }

      .reveal-text-left,
      .reveal-text-right {
        font-size: 6vw;
      }

      .logo-fragment {
        font-size: 14vw;
      }
    }
  </style>
</head>
