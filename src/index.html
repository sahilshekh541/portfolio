<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Sahil shekh | Angular Developer expereince 1.5years</title>
  <base href="/" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <!-- google fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Istok+Web:ital,wght@0,400;0,700;1,400;1,700&family=Sora:wght@100..800&display=swap"
    rel="stylesheet">
  <style>
    .loader-wrapper {
      display: flex;
      height: 100vh;
      width: 100%;
      background-color: black;
      position: fixed;
      top: 0;
      z-index: 9999;
    }

    .loader {
      font-size: 48px;
      display: inline-block;
      font-family: "Sora", sans-serif;
      font-weight: bold;
      color: #FFF;
      letter-spacing: 2px;
      position: relative;
      box-sizing: border-box;
    }

    .loader::after {
      content: 'Sahil';
      position: absolute;
      left: 0;
      top: 0;
      color: #263238;
      text-shadow: 0 0 2px #FFF, 0 0 1px #FFF, 0 0 1px #FFF;
      width: 100%;
      height: 100%;
      overflow: hidden;
      box-sizing: border-box;
      animation: animloader 6s linear infinite;
    }

    @keyframes animloader {
      0% {
        height: 100%;
      }

      100% {
        height: 0%;
      }
    }
  </style>
</head>

<body>
  <app-root></app-root>
  <!-- loader  -->
  <div id="initial-loader" class="loader-wrapper flex-column align-items-center justify-content-center">
    <span class="loader">Sahil</span>
  </div>
  <script>
    function hideInitialLoader() {
      const loader = document.getElementById('initial-loader');
      if (loader) {
        // Use a slight fade-out effect for a smoother transition
        loader.style.opacity = '0';
        setTimeout(() => {
          loader.style.display = 'none';
        }, 500); // Wait for the transition
      }
    }
  </script>
</body>

</html>
