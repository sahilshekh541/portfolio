<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Sahil shekh | Angular Developer expereince 1.5years</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="canonical" href="https://sahilshekh.vercel.app" />
    <link
      href="https://fonts.googleapis.com/css2?family=Istok+Web:ital,wght@0,400;0,700;1,400;1,700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Sora:wght@100..800&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
      body {
        overflow-y: hidden;
      }

      .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 999;
        display: flex;
      }

      .overlay .bar {
        width: 10vw;
        height: 105vh;
        background-color: #1a1a1a;
      }

      .counter {
        position: fixed;
        bottom: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: flex-end;
        align-items: flex-end;
        z-index: 1000;
        color: #bcbcc4 !important;
        font-size: 20vw;
        font-family: "Sora", sans-serif;
      }
    </style>
  </head>

  <body>
    <app-root></app-root>
    <h1 id="app-loader-counter" class="counter">0</h1>
    <div id="app-loader" class="overlay">
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
      <div class="bar"></div>
    </div>
    <!-- scripts moved to head -->
    <script>
      function startLoader() {
        const counter = document.querySelector("#app-loader-counter");
        let count = 0;

        function updateCounter() {
          if (count >= 100) return;

          count += Math.floor(Math.random() * 10) + 1;
          if (count > 100) count = 100;

          counter.textContent = count;

          setTimeout(updateCounter, 80);
        }

        updateCounter();
      }

      startLoader();

      // 👇 GLOBAL FUNCTION Angular will call
      window.hideAppLoader = function () {
        gsap.to("#app-loader-counter", {
          opacity: 0,
          duration: 0.3,
        });

        gsap.to("#app-loader .bar", {
          height: 0,
          duration: 1.2,
          stagger: { amount: 0.5 },
          ease: "power4.inOut",
          onComplete: () => {
            document.getElementById("app-loader").style.display = "none";
            document.getElementById("app-loader-counter").style.display =
              "none";
            document.body.style.overflowY = "auto";
          },
        });
      };
    </script>
  </body>
</html>
