  <script>
    function startLoader() {
      const counter = document.querySelector("#app-loader-counter");
      let count = 0;

      function updateCounter() {
        if (count >= 100) return;

        count += Math.floor(Math.random() * 10) + 1;
        if (count > 100) count = 100;

        counter.textContent = count;

        setTimeout(updateCounter, 80);
      }

      updateCounter();
    }

    startLoader();

    // 👇 GLOBAL FUNCTION Angular will call

      gsap.to("#app-loader-counter", {
        opacity: 0,
        duration: 0.3,
      });

      gsap.to("#app-loader .bar", {
        height: 0,
        duration: 1.2,
        stagger: { amount: 0.5 },
        ease: "power4.inOut",
        onComplete: () => {
